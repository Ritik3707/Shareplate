name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./docker/Dockerfile.backend.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/shareplate-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/shareplate-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./docker/Dockerfile.frontend.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/shareplate-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/shareplate-frontend:${{ github.sha }}

      - name: Deploy to production
        run: |
          echo "Deploying to production server..."
          # Add your deployment commands here (SSH, kubectl, etc.)
