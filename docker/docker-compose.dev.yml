version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: shareplate-postgres
    environment:
      POSTGRES_USER: shareplate
      POSTGRES_PASSWORD: shareplate_password
      POSTGRES_DB: shareplate_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shareplate -d shareplate_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shareplate-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: shareplate-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://shareplate:shareplate_password@postgres:5432/shareplate_db?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    volumes:
      - ../backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: shareplate-frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
